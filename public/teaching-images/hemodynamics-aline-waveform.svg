<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background:#1a1a2e">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #e0e0e0; }
      .label { font-size: 14px; fill: #94d2bd; }
      .title { font-size: 18px; fill: #ee9b00; font-weight: bold; }
      .highlight { fill: #e63946; font-size: 13px; }
      .dim { fill: #888; font-size: 12px; }
    </style>
  </defs>
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Arterial Line Waveform</text>
  <!-- Grid -->
  <line x1="60" y1="50" x2="60" y2="320" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="320" x2="760" y2="320" stroke="#333" stroke-width="1"/>
  <!-- Y axis labels -->
  <text x="50" y="80" text-anchor="end" class="dim">120</text>
  <text x="50" y="140" text-anchor="end" class="dim">100</text>
  <text x="50" y="200" text-anchor="end" class="dim">80</text>
  <text x="50" y="260" text-anchor="end" class="dim">60</text>
  <text x="50" y="320" text-anchor="end" class="dim">40</text>
  <text x="25" y="200" text-anchor="middle" transform="rotate(-90,25,200)" class="label">mmHg</text>
  <!-- Grid lines -->
  <line x1="60" y1="80" x2="760" y2="80" stroke="#333" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="60" y1="140" x2="760" y2="140" stroke="#333" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="60" y1="200" x2="760" y2="200" stroke="#333" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="60" y1="260" x2="760" y2="260" stroke="#333" stroke-width="0.5" stroke-dasharray="4"/>
  <!-- Waveform 1 -->
  <path d="M 80,260 Q 90,258 100,250 L 115,80 Q 118,70 122,85 L 135,120 Q 140,130 145,140 L 155,170 Q 158,180 160,175 Q 163,168 165,172 L 175,200 Q 195,240 220,260" 
        stroke="#e63946" stroke-width="2.5" fill="none"/>
  <!-- Waveform 2 -->
  <path d="M 220,260 Q 230,258 240,250 L 255,80 Q 258,70 262,85 L 275,120 Q 280,130 285,140 L 295,170 Q 298,180 300,175 Q 303,168 305,172 L 315,200 Q 335,240 360,260" 
        stroke="#e63946" stroke-width="2.5" fill="none"/>
  <!-- Waveform 3 -->
  <path d="M 360,260 Q 370,258 380,250 L 395,80 Q 398,70 402,85 L 415,120 Q 420,130 425,140 L 435,170 Q 438,180 440,175 Q 443,168 445,172 L 455,200 Q 475,240 500,260" 
        stroke="#e63946" stroke-width="2.5" fill="none"/>
  <!-- Annotations -->
  <!-- Upstroke -->
  <line x1="100" y1="250" x2="115" y2="80" stroke="#94d2bd" stroke-width="1" stroke-dasharray="3"/>
  <text x="85" y="165" class="label" transform="rotate(-70,85,165)">Upstroke (dP/dt)</text>
  <!-- Peak / Systolic -->
  <line x1="255" y1="80" x2="255" y2="55" stroke="#ee9b00" stroke-width="1" stroke-dasharray="3"/>
  <text x="255" y="50" text-anchor="middle" class="label" style="fill:#ee9b00">Peak (SBP)</text>
  <!-- Dicrotic notch -->
  <circle cx="300" cy="175" r="8" fill="none" stroke="#94d2bd" stroke-width="1.5"/>
  <line x1="308" y1="175" x2="370" y2="145" stroke="#94d2bd" stroke-width="1" stroke-dasharray="3"/>
  <text x="375" y="142" class="label">Dicrotic Notch</text>
  <text x="375" y="158" class="dim">(Aortic valve closure)</text>
  <!-- Diastolic -->
  <line x1="500" y1="260" x2="500" y2="285" stroke="#ee9b00" stroke-width="1" stroke-dasharray="3"/>
  <text x="500" y="300" text-anchor="middle" class="label" style="fill:#ee9b00">DBP</text>
  <!-- Pulse Pressure annotation -->
  <line x1="560" y1="80" x2="560" y2="260" stroke="#94d2bd" stroke-width="1"/>
  <line x1="555" y1="80" x2="565" y2="80" stroke="#94d2bd" stroke-width="1"/>
  <line x1="555" y1="260" x2="565" y2="260" stroke="#94d2bd" stroke-width="1"/>
  <text x="575" y="165" class="label">Pulse</text>
  <text x="575" y="180" class="label">Pressure</text>
  <text x="575" y="195" class="dim">(SBP-DBP)</text>
  <!-- Legend -->
  <text x="400" y="370" text-anchor="middle" class="dim">Wikimedia Commons / Educational Use — CC BY-SA</text>
</svg>
