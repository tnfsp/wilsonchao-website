<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="background:#1a1a2e">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #e0e0e0; }
      .title { font-size: 18px; fill: #ee9b00; font-weight: bold; }
      .subtitle { font-size: 14px; fill: #94d2bd; font-weight: bold; }
      .dim { fill: #888; font-size: 12px; }
      .label { font-size: 13px; fill: #94d2bd; }
    </style>
  </defs>
  <text x="400" y="30" text-anchor="middle" class="title">Ventilator Mode: AC vs PS — Pressure Waveform</text>
  <!-- AC Mode -->
  <text x="200" y="65" text-anchor="middle" class="subtitle">AC Mode (Assist-Control)</text>
  <text x="200" y="82" text-anchor="middle" class="dim">機器設定每一口的 TV 或 Pressure，保證給到</text>
  <!-- AC axis -->
  <line x1="50" y1="100" x2="50" y2="230" stroke="#444" stroke-width="1"/>
  <line x1="50" y1="230" x2="380" y2="230" stroke="#444" stroke-width="1"/>
  <text x="40" y="115" text-anchor="end" class="dim">Paw</text>
  <text x="200" y="248" text-anchor="middle" class="dim">Time →</text>
  <!-- AC waveform - square waves (uniform) -->
  <path d="M 60,230 L 60,140 L 130,140 L 130,230 L 140,230 L 140,140 L 210,140 L 210,230 L 220,230 L 220,140 L 290,140 L 290,230 L 300,230 L 300,140 L 370,140 L 370,230" 
        stroke="#e63946" stroke-width="2" fill="none"/>
  <!-- PEEP line -->
  <line x1="50" y1="220" x2="380" y2="220" stroke="#4cc9f0" stroke-width="1" stroke-dasharray="4"/>
  <text x="385" y="224" class="dim" style="fill:#4cc9f0">PEEP</text>
  <!-- Annotations -->
  <text x="95" y="132" text-anchor="middle" class="label" style="font-size:11px">Fixed</text>
  <text x="165" y="132" text-anchor="middle" class="label" style="font-size:11px">Fixed</text>
  <text x="255" y="132" text-anchor="middle" class="label" style="font-size:11px">Fixed</text>
  <text x="335" y="132" text-anchor="middle" class="label" style="font-size:11px">Fixed</text>
  <!-- PS Mode -->
  <text x="600" y="65" text-anchor="middle" class="subtitle">PS Mode (Pressure Support)</text>
  <text x="600" y="82" text-anchor="middle" class="dim">病人觸發，機器幫忙推一把</text>
  <!-- PS axis -->
  <line x1="440" y1="100" x2="440" y2="230" stroke="#444" stroke-width="1"/>
  <line x1="440" y1="230" x2="770" y2="230" stroke="#444" stroke-width="1"/>
  <text x="430" y="115" text-anchor="end" class="dim">Paw</text>
  <text x="600" y="248" text-anchor="middle" class="dim">Time →</text>
  <!-- PS waveform - variable, patient-triggered, more natural shape -->
  <path d="M 450,230 L 453,200 Q 458,150 470,145 Q 490,140 510,160 Q 520,175 530,230 
           L 555,230 L 558,195 Q 563,145 575,140 Q 600,135 625,165 Q 635,185 645,230
           L 680,230 L 683,205 Q 688,158 698,150 Q 715,142 735,170 Q 745,190 755,230" 
        stroke="#2a9d8f" stroke-width="2" fill="none"/>
  <!-- PEEP line -->
  <line x1="440" y1="220" x2="770" y2="220" stroke="#4cc9f0" stroke-width="1" stroke-dasharray="4"/>
  <text x="775" y="224" class="dim" style="fill:#4cc9f0">PEEP</text>
  <!-- Trigger marks -->
  <text x="453" y="225" class="dim" style="fill:#ee9b00; font-size:10px">↑</text>
  <text x="558" y="225" class="dim" style="fill:#ee9b00; font-size:10px">↑</text>
  <text x="683" y="225" class="dim" style="fill:#ee9b00; font-size:10px">↑</text>
  <text x="600" y="268" text-anchor="middle" class="dim" style="fill:#ee9b00">↑ = Patient trigger</text>
  <!-- Comparison table -->
  <rect x="50" y="280" width="700" height="150" rx="8" fill="#0d1b2a" stroke="#333"/>
  <text x="400" y="305" text-anchor="middle" class="subtitle">比較</text>
  <line x1="60" y1="315" x2="740" y2="315" stroke="#333"/>
  <text x="200" y="335" text-anchor="middle" style="fill:#e63946; font-weight:bold">AC Mode</text>
  <text x="550" y="335" text-anchor="middle" style="fill:#2a9d8f; font-weight:bold">PS Mode</text>
  <text x="200" y="355" text-anchor="middle" class="dim">完全控制：設定 RR + TV/Pressure</text>
  <text x="550" y="355" text-anchor="middle" class="dim">輔助：病人決定 RR，機器幫推</text>
  <text x="200" y="375" text-anchor="middle" class="dim">適合：剛手術、還沒醒</text>
  <text x="550" y="375" text-anchor="middle" class="dim">適合：Weaning、病人有自主呼吸</text>
  <text x="200" y="395" text-anchor="middle" class="dim">風險：Over-ventilation</text>
  <text x="550" y="395" text-anchor="middle" class="dim">風險：Hypoventilation（PS 設太低）</text>
  <text x="200" y="415" text-anchor="middle" class="dim">🔒 安全但被動</text>
  <text x="550" y="415" text-anchor="middle" class="dim">🏃 自由但需監測</text>
</svg>
