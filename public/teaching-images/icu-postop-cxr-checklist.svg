<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" style="background:#1a1a2e">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #e0e0e0; }
      .title { font-size: 18px; fill: #ee9b00; font-weight: bold; }
      .item { font-size: 13px; }
      .check { fill: #2a9d8f; font-size: 14px; font-weight: bold; }
      .dim { fill: #888; font-size: 11px; }
    </style>
  </defs>
  <text x="350" y="30" text-anchor="middle" class="title">術後 CXR Checklist</text>
  <!-- CXR representation -->
  <rect x="200" y="50" width="300" height="250" rx="15" fill="#0a1628" stroke="#333" stroke-width="2"/>
  <!-- Lung fields -->
  <ellipse cx="290" cy="160" rx="60" ry="90" fill="none" stroke="#444" stroke-width="1.5"/>
  <ellipse cx="410" cy="160" rx="60" ry="90" fill="none" stroke="#444" stroke-width="1.5"/>
  <!-- Heart shadow -->
  <ellipse cx="330" cy="190" rx="45" ry="55" fill="#1a1a2e" stroke="#555" stroke-width="1.5"/>
  <!-- Mediastinum -->
  <line x1="350" y1="60" x2="350" y2="290" stroke="#555" stroke-width="1" stroke-dasharray="4"/>
  <!-- ETT -->
  <line x1="350" y1="50" x2="350" y2="110" stroke="#4cc9f0" stroke-width="3"/>
  <text x="365" y="85" style="fill:#4cc9f0; font-size:11px">ETT</text>
  <!-- Chest tubes -->
  <line x1="240" y1="220" x2="210" y2="290" stroke="#ee9b00" stroke-width="2"/>
  <line x1="440" y1="230" x2="480" y2="290" stroke="#ee9b00" stroke-width="2"/>
  <text x="195" y="305" style="fill:#ee9b00; font-size:10px">CT</text>
  <text x="483" y="305" style="fill:#ee9b00; font-size:10px">CT</text>
  <!-- Sternal wires -->
  <line x1="345" y1="120" x2="355" y2="120" stroke="#aaa" stroke-width="2"/>
  <line x1="345" y1="145" x2="355" y2="145" stroke="#aaa" stroke-width="2"/>
  <line x1="345" y1="170" x2="355" y2="170" stroke="#aaa" stroke-width="2"/>
  <line x1="345" y1="195" x2="355" y2="195" stroke="#aaa" stroke-width="2"/>
  <!-- Pacing wires -->
  <line x1="370" y1="200" x2="395" y2="230" stroke="#e63946" stroke-width="1.5" stroke-dasharray="3"/>
  <text x="400" y="240" style="fill:#e63946; font-size:9px">Pacing</text>
  <!-- Checklist -->
  <text x="30" y="340" class="title" style="font-size:15px">✅ 系統性讀片</text>
  <text x="30" y="365" class="check">☑</text><text x="50" y="365" class="item">ETT 位置：carina 上 2-4 cm</text>
  <text x="30" y="385" class="check">☑</text><text x="50" y="385" class="item">Chest tube 位置 + 是否有 PTX</text>
  <text x="30" y="405" class="check">☑</text><text x="50" y="405" class="item">心影大小（widened mediastinum?）</text>
  <text x="30" y="425" class="check">☑</text><text x="50" y="425" class="item">肺野：atelectasis / effusion / edema</text>
  <text x="380" y="365" class="check">☑</text><text x="400" y="365" class="item">Sternal wires 對齊</text>
  <text x="380" y="385" class="check">☑</text><text x="400" y="385" class="item">Pacing wire 位置</text>
  <text x="380" y="405" class="check">☑</text><text x="400" y="405" class="item">Hemidiaphragm 高度（phrenic?）</text>
  <text x="380" y="425" class="check">☑</text><text x="400" y="425" class="item">Lines: CVC / PA cath 位置</text>
</svg>
