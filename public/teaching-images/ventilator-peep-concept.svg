<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" style="background:#1a1a2e">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #e0e0e0; }
      .title { font-size: 18px; fill: #ee9b00; font-weight: bold; }
      .subtitle { font-size: 14px; fill: #94d2bd; font-weight: bold; }
      .dim { fill: #888; font-size: 12px; }
    </style>
  </defs>
  <text x="400" y="30" text-anchor="middle" class="title">PEEP 的概念 — 撐住肺泡</text>
  <!-- No PEEP side -->
  <text x="200" y="60" text-anchor="middle" class="subtitle">無 PEEP</text>
  <!-- Collapsed alveoli -->
  <circle cx="120" cy="140" r="15" fill="none" stroke="#e63946" stroke-width="2" stroke-dasharray="4"/>
  <text x="120" y="145" text-anchor="middle" style="font-size:10px; fill:#e63946">塌陷</text>
  <circle cx="180" cy="120" r="20" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="240" cy="140" r="12" fill="none" stroke="#e63946" stroke-width="2" stroke-dasharray="4"/>
  <text x="240" y="145" text-anchor="middle" style="font-size:10px; fill:#e63946">塌陷</text>
  <circle cx="160" cy="170" r="18" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="220" cy="180" r="10" fill="none" stroke="#e63946" stroke-width="2" stroke-dasharray="4"/>
  <!-- Bronchi -->
  <line x1="180" y1="80" x2="180" y2="100" stroke="#888" stroke-width="2"/>
  <line x1="180" y1="100" x2="140" y2="120" stroke="#888" stroke-width="1.5"/>
  <line x1="180" y1="100" x2="220" y2="120" stroke="#888" stroke-width="1.5"/>
  <text x="200" y="220" text-anchor="middle" class="dim" style="fill:#e63946; font-size:14px">Atelectasis → ↓ Gas Exchange</text>
  <text x="200" y="240" text-anchor="middle" class="dim">SpO₂ 下降</text>
  <!-- Arrow -->
  <text x="400" y="150" text-anchor="middle" style="font-size:30px; fill:#ee9b00">→</text>
  <text x="400" y="175" text-anchor="middle" class="subtitle" style="font-size:13px">加 PEEP</text>
  <!-- With PEEP side -->
  <text x="600" y="60" text-anchor="middle" class="subtitle">有 PEEP (5-8 cmH₂O)</text>
  <!-- Open alveoli -->
  <circle cx="520" cy="130" r="25" fill="none" stroke="#2a9d8f" stroke-width="2"/>
  <circle cx="580" cy="120" r="28" fill="none" stroke="#2a9d8f" stroke-width="2"/>
  <circle cx="650" cy="130" r="22" fill="none" stroke="#2a9d8f" stroke-width="2"/>
  <circle cx="550" cy="170" r="26" fill="none" stroke="#2a9d8f" stroke-width="2"/>
  <circle cx="620" cy="175" r="24" fill="none" stroke="#2a9d8f" stroke-width="2"/>
  <!-- Bronchi -->
  <line x1="580" y1="75" x2="580" y2="95" stroke="#2a9d8f" stroke-width="2"/>
  <line x1="580" y1="95" x2="540" y2="110" stroke="#2a9d8f" stroke-width="1.5"/>
  <line x1="580" y1="95" x2="620" y2="105" stroke="#2a9d8f" stroke-width="1.5"/>
  <!-- Small arrows showing air keeping alveoli open -->
  <text x="520" y="135" text-anchor="middle" style="font-size:16px">🌬️</text>
  <text x="580" y="125" text-anchor="middle" style="font-size:16px">🌬️</text>
  <text x="650" y="135" text-anchor="middle" style="font-size:16px">🌬️</text>
  <text x="600" y="220" text-anchor="middle" class="dim" style="fill:#2a9d8f; font-size:14px">Recruitment → ↑ Gas Exchange</text>
  <text x="600" y="240" text-anchor="middle" class="dim">SpO₂ 改善</text>
  <!-- Warning box -->
  <rect x="100" y="270" width="600" height="60" rx="8" fill="#0d1b2a" stroke="#e63946" stroke-width="1"/>
  <text x="400" y="295" text-anchor="middle" style="fill:#e63946; font-weight:bold; font-size:14px">⚠️ PEEP 太高的代價（心外特別注意）</text>
  <text x="400" y="315" text-anchor="middle" class="dim">PEEP ↑ → 胸腔正壓 ↑ → Venous Return ↓ → CO ↓ → RV Afterload ↑</text>
</svg>
