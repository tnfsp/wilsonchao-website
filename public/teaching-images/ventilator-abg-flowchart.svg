<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" style="background:#1a1a2e">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #e0e0e0; }
      .title { font-size: 17px; fill: #ee9b00; font-weight: bold; }
      .step { font-size: 14px; fill: #94d2bd; font-weight: bold; }
      .dim { fill: #888; font-size: 12px; }
      .val { fill: #4cc9f0; font-size: 13px; }
    </style>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  <text x="400" y="28" text-anchor="middle" class="title">ABG 判讀步驟</text>
  <!-- Step 1 -->
  <rect x="20" y="50" width="130" height="60" rx="8" fill="#0d1b2a" stroke="#ee9b00" stroke-width="2"/>
  <text x="85" y="72" text-anchor="middle" class="step">① pH</text>
  <text x="85" y="92" text-anchor="middle" class="val">&lt;7.35 = Acidosis</text>
  <text x="85" y="106" text-anchor="middle" class="val">&gt;7.45 = Alkalosis</text>
  <line x1="150" y1="80" x2="170" y2="80" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- Step 2 -->
  <rect x="175" y="50" width="130" height="60" rx="8" fill="#0d1b2a" stroke="#ee9b00" stroke-width="2"/>
  <text x="240" y="72" text-anchor="middle" class="step">② PCO₂</text>
  <text x="240" y="92" text-anchor="middle" class="val">&gt;45 = Resp Acid</text>
  <text x="240" y="106" text-anchor="middle" class="val">&lt;35 = Resp Alka</text>
  <line x1="305" y1="80" x2="325" y2="80" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- Step 3 -->
  <rect x="330" y="50" width="130" height="60" rx="8" fill="#0d1b2a" stroke="#ee9b00" stroke-width="2"/>
  <text x="395" y="72" text-anchor="middle" class="step">③ HCO₃⁻</text>
  <text x="395" y="92" text-anchor="middle" class="val">&lt;22 = Met Acid</text>
  <text x="395" y="106" text-anchor="middle" class="val">&gt;26 = Met Alka</text>
  <line x1="460" y1="80" x2="480" y2="80" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- Step 4 -->
  <rect x="485" y="50" width="130" height="60" rx="8" fill="#0d1b2a" stroke="#ee9b00" stroke-width="2"/>
  <text x="550" y="72" text-anchor="middle" class="step">④ AG</text>
  <text x="550" y="92" text-anchor="middle" class="val">Na-(Cl+HCO₃)</text>
  <text x="550" y="106" text-anchor="middle" class="val">&gt;12 = HAGMA</text>
  <line x1="615" y1="80" x2="635" y2="80" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- Step 5 -->
  <rect x="640" y="50" width="140" height="60" rx="8" fill="#0d1b2a" stroke="#ee9b00" stroke-width="2"/>
  <text x="710" y="72" text-anchor="middle" class="step">⑤ Compensation</text>
  <text x="710" y="92" text-anchor="middle" class="val">公式算預期值</text>
  <text x="710" y="106" text-anchor="middle" class="val">不夠 = Mixed</text>
  <!-- Common patterns box -->
  <rect x="50" y="140" width="300" height="160" rx="8" fill="#0d1b2a" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="200" y="165" text-anchor="middle" class="step" style="fill:#2a9d8f">術後常見 Pattern</text>
  <line x1="60" y1="175" x2="340" y2="175" stroke="#333"/>
  <text x="70" y="195" class="dim" style="font-size:12px">📍 Respiratory acidosis（pH↓ PCO₂↑）</text>
  <text x="80" y="212" class="dim">→ 通氣不足：還沒醒/sedation 太深</text>
  <text x="70" y="235" class="dim" style="font-size:12px; fill:#e63946">📍 Metabolic acidosis（pH↓ HCO₃↓ Lac↑）</text>
  <text x="80" y="252" class="dim" style="fill:#e63946">→ 灌流不足！治心臟，不是調 RR</text>
  <text x="70" y="275" class="dim" style="font-size:12px">📍 Mixed（Resp + Met acidosis）</text>
  <text x="80" y="292" class="dim">→ 最嚴重：通氣 + 灌流都不足</text>
  <!-- Key message -->
  <rect x="400" y="140" width="350" height="80" rx="8" fill="#1a0000" stroke="#e63946" stroke-width="1.5"/>
  <text x="575" y="165" text-anchor="middle" style="fill:#e63946; font-weight:bold; font-size:15px">⚠️ 最重要的一句話</text>
  <text x="575" y="190" text-anchor="middle" class="dim" style="font-size:13px">Metabolic acidosis + Lactate↑</text>
  <text x="575" y="210" text-anchor="middle" class="dim" style="font-size:13px; fill:#e63946">→ 這不是呼吸器的問題！去看 hemodynamics</text>
</svg>
