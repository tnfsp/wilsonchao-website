<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" style="background:#1a1a2e">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #e0e0e0; }
      .title { font-size: 17px; fill: #ee9b00; font-weight: bold; }
      .dim { fill: #888; font-size: 11px; }
      .step { font-size: 14px; font-weight: bold; }
    </style>
    <marker id="ar2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  <text x="400" y="28" text-anchor="middle" class="title">LCOS 處理 Escalation — 藥物到機械支持</text>
  <!-- Step 1: Rule out -->
  <rect x="50" y="50" width="180" height="70" rx="10" fill="#1a0000" stroke="#e63946" stroke-width="2"/>
  <text x="140" y="72" text-anchor="middle" class="step" style="fill:#e63946">① 排除致命可逆</text>
  <text x="140" y="92" text-anchor="middle" class="dim">Tamponade</text>
  <text x="140" y="106" text-anchor="middle" class="dim">Tension PTX / Graft failure</text>
  <line x1="230" y1="85" x2="260" y2="85" stroke="#666" stroke-width="1.5" marker-end="url(#ar2)"/>
  <!-- Step 2: Optimize preload -->
  <rect x="265" y="50" width="150" height="70" rx="10" fill="#0d1b2a" stroke="#4cc9f0" stroke-width="2"/>
  <text x="340" y="72" text-anchor="middle" class="step" style="fill:#4cc9f0">② 優化 Preload</text>
  <text x="340" y="92" text-anchor="middle" class="dim">PCWP sweet spot</text>
  <text x="340" y="106" text-anchor="middle" class="dim">12-18 mmHg</text>
  <line x1="415" y1="85" x2="445" y2="85" stroke="#666" stroke-width="1.5" marker-end="url(#ar2)"/>
  <!-- Step 3: Inotrope -->
  <rect x="450" y="50" width="150" height="70" rx="10" fill="#0d1b2a" stroke="#2a9d8f" stroke-width="2"/>
  <text x="525" y="72" text-anchor="middle" class="step" style="fill:#2a9d8f">③ Inotrope</text>
  <text x="525" y="92" text-anchor="middle" class="dim">Dobutamine first</text>
  <text x="525" y="106" text-anchor="middle" class="dim">± Milrinone / NE</text>
  <line x1="600" y1="85" x2="630" y2="85" stroke="#666" stroke-width="1.5" marker-end="url(#ar2)"/>
  <!-- Step 4: Mechanical -->
  <rect x="635" y="50" width="140" height="70" rx="10" fill="#0d1b2a" stroke="#ee9b00" stroke-width="2"/>
  <text x="705" y="72" text-anchor="middle" class="step" style="fill:#ee9b00">④ Mechanical</text>
  <text x="705" y="92" text-anchor="middle" class="dim">IABP → Impella</text>
  <text x="705" y="106" text-anchor="middle" class="dim">→ VA-ECMO</text>
  <!-- Mechanical support details -->
  <rect x="50" y="160" width="210" height="80" rx="8" fill="#0d1b2a" stroke="#94d2bd" stroke-width="1"/>
  <text x="155" y="182" text-anchor="middle" style="fill:#94d2bd; font-weight:bold; font-size:14px">IABP</text>
  <text x="155" y="200" text-anchor="middle" class="dim">↓ LV afterload + ↑ Diastolic coronary flow</text>
  <text x="155" y="218" text-anchor="middle" class="dim">CI 提升有限 (~0.5 L/min)</text>
  <text x="155" y="234" text-anchor="middle" class="dim">最快啟動，borderline LCOS</text>
  <line x1="260" y1="200" x2="290" y2="200" stroke="#666" stroke-width="1.5" marker-end="url(#ar2)"/>
  <rect x="295" y="160" width="210" height="80" rx="8" fill="#0d1b2a" stroke="#ee9b00" stroke-width="1"/>
  <text x="400" y="182" text-anchor="middle" style="fill:#ee9b00; font-weight:bold; font-size:14px">Impella</text>
  <text x="400" y="200" text-anchor="middle" class="dim">Axial flow pump in LV → Aorta</text>
  <text x="400" y="218" text-anchor="middle" class="dim">CP: ~3.7 L/min 支持力</text>
  <text x="400" y="234" text-anchor="middle" class="dim">比 IABP 強，更侵入性</text>
  <line x1="505" y1="200" x2="535" y2="200" stroke="#666" stroke-width="1.5" marker-end="url(#ar2)"/>
  <rect x="540" y="160" width="220" height="80" rx="8" fill="#1a0000" stroke="#e63946" stroke-width="1.5"/>
  <text x="650" y="182" text-anchor="middle" style="fill:#e63946; font-weight:bold; font-size:14px">VA-ECMO</text>
  <text x="650" y="200" text-anchor="middle" class="dim">終極武器：完全取代心肺</text>
  <text x="650" y="218" text-anchor="middle" class="dim">Refractory cardiogenic shock</text>
  <text x="650" y="234" text-anchor="middle" class="dim" style="fill:#e63946">出血、limb ischemia、LV distension</text>
  <!-- Key message -->
  <rect x="150" y="270" width="500" height="55" rx="8" fill="#0d1b2a" stroke="#94d2bd" stroke-width="1"/>
  <text x="400" y="293" text-anchor="middle" style="fill:#94d2bd; font-weight:bold; font-size:14px">💡 不是照順序走，是看惡化速度</text>
  <text x="400" y="313" text-anchor="middle" class="dim" style="font-size:12px">快速惡化 → 直接跳 ECMO ｜ Stunned myocardium 有恢復機會 → IABP bridge</text>
</svg>
