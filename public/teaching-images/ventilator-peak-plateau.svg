<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background:#1a1a2e">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #e0e0e0; }
      .title { font-size: 18px; fill: #ee9b00; font-weight: bold; }
      .label { font-size: 13px; fill: #94d2bd; }
      .dim { fill: #888; font-size: 12px; }
      .danger { fill: #e63946; font-weight: bold; }
    </style>
  </defs>
  <text x="400" y="30" text-anchor="middle" class="title">Peak vs Plateau Pressure</text>
  <!-- Axis -->
  <line x1="80" y1="50" x2="80" y2="310" stroke="#444" stroke-width="1"/>
  <line x1="80" y1="310" x2="720" y2="310" stroke="#444" stroke-width="1"/>
  <text x="40" y="180" text-anchor="middle" transform="rotate(-90,40,180)" class="label">Airway Pressure (cmH₂O)</text>
  <text x="400" y="340" text-anchor="middle" class="dim">Time →</text>
  <!-- Y labels -->
  <text x="70" y="80" text-anchor="end" class="dim">35</text>
  <text x="70" y="130" text-anchor="end" class="dim">30</text>
  <text x="70" y="180" text-anchor="end" class="dim">25</text>
  <text x="70" y="230" text-anchor="end" class="dim">20</text>
  <text x="70" y="280" text-anchor="end" class="dim">5</text>
  <text x="70" y="310" text-anchor="end" class="dim">0</text>
  <!-- Gridlines -->
  <line x1="80" y1="80" x2="720" y2="80" stroke="#333" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="80" y1="130" x2="720" y2="130" stroke="#333" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="80" y1="180" x2="720" y2="180" stroke="#333" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="80" y1="230" x2="720" y2="230" stroke="#333" stroke-width="0.5" stroke-dasharray="4"/>
  <!-- PEEP baseline -->
  <line x1="80" y1="280" x2="720" y2="280" stroke="#4cc9f0" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="725" y="284" class="dim" style="fill:#4cc9f0">PEEP (5)</text>
  <!-- Pressure waveform -->
  <path d="M 100,280 L 110,280 L 120,100 Q 125,80 130,90 L 140,100 L 160,120 L 200,130 L 230,130 
           L 260,280 L 350,280 L 360,280 L 370,100 Q 375,80 380,90 L 390,100 L 410,120 L 450,130 L 480,130
           L 510,280 L 600,280" 
        stroke="#ee9b00" stroke-width="2.5" fill="none"/>
  <!-- Peak annotation -->
  <line x1="125" y1="80" x2="125" y2="55" stroke="#e63946" stroke-width="1" stroke-dasharray="3"/>
  <text x="125" y="50" text-anchor="middle" class="danger" style="font-size:15px">Peak</text>
  <!-- Plateau annotation -->
  <line x1="200" y1="130" x2="200" y2="145" stroke="#2a9d8f" stroke-width="1" stroke-dasharray="3"/>
  <text x="200" y="162" text-anchor="middle" style="fill:#2a9d8f; font-weight:bold; font-size:14px">Plateau</text>
  <text x="200" y="178" text-anchor="middle" class="dim">（Inspiratory hold）</text>
  <!-- Driving pressure annotation -->
  <line x1="500" y1="130" x2="500" y2="280" stroke="#94d2bd" stroke-width="1.5"/>
  <line x1="495" y1="130" x2="505" y2="130" stroke="#94d2bd" stroke-width="1.5"/>
  <line x1="495" y1="280" x2="505" y2="280" stroke="#94d2bd" stroke-width="1.5"/>
  <text x="515" y="190" class="label" style="font-size:14px">Driving</text>
  <text x="515" y="206" class="label" style="font-size:14px">Pressure</text>
  <text x="515" y="222" class="dim">= Plateau − PEEP</text>
  <text x="515" y="238" class="dim" style="fill:#e63946">目標 &lt; 15 cmH₂O</text>
  <!-- Peak-Plateau difference = Resistance -->
  <line x1="140" y1="80" x2="140" y2="130" stroke="#e63946" stroke-width="1.5"/>
  <line x1="135" y1="80" x2="145" y2="80" stroke="#e63946" stroke-width="1.5"/>
  <line x1="135" y1="130" x2="145" y2="130" stroke="#e63946" stroke-width="1.5"/>
  <text x="155" y="100" class="dim" style="fill:#e63946; font-size:11px">Resistance</text>
  <text x="155" y="115" class="dim" style="font-size:11px">（管路/氣道）</text>
  <!-- Legend box -->
  <rect x="80" y="350" width="620" height="40" rx="5" fill="#0d1b2a" stroke="#333"/>
  <text x="100" y="375" class="dim">Peak↑ Plateau 正常 → <tspan style="fill:#e63946">管子問題</tspan>（mucus plug, bronchospasm）</text>
  <text x="450" y="375" class="dim">Peak↑ Plateau↑ → <tspan style="fill:#e63946">肺問題</tspan>（PTX, atelectasis, edema）</text>
</svg>
